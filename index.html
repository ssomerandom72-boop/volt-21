<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOLTAGE 21</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: #000;
        color: #ccc;
        font-family: 'Courier New', monospace;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
        user-select: none;
    }

    canvas { position: fixed; top: 0; left: 0; }

    /* ── OVERLAYS ── */
    #shock-overlay {
        position: fixed; inset: 0;
        background: rgba(80, 200, 255, 0.0);
        pointer-events: none;
        z-index: 200;
        transition: background 0.05s;
    }
    #shock-overlay.shocking {
        animation: shock-flash 0.6s ease-out forwards;
    }
    @keyframes shock-flash {
        0%   { background: rgba(80,200,255,0.85); }
        15%  { background: rgba(255,255,255,0.95); }
        30%  { background: rgba(80,200,255,0.6); }
        50%  { background: rgba(80,200,255,0.3); }
        100% { background: rgba(80,200,255,0.0); }
    }

    #vignette {
        position: fixed; inset: 0;
        background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.85) 100%);
        pointer-events: none;
        z-index: 5;
    }

    /* ── UI LAYER ── */
    #ui {
        position: fixed; inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        pointer-events: none;
        z-index: 20;
    }

    /* ── TOP BAR ── */
    .info-bar {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        width: 100%;
        padding: 18px 28px 0;
        gap: 12px;
    }

    .player-panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        background: rgba(5,0,8,0.88);
        border: 1px solid #330044;
        padding: 12px 22px 14px;
        min-width: 150px;
        box-shadow: 0 0 18px rgba(100,0,180,0.35), inset 0 0 20px rgba(0,0,0,0.65);
    }

    .player-name-label {
        font-size: 0.55em;
        letter-spacing: 5px;
        text-transform: uppercase;
        color: #550077;
        font-weight: bold;
    }

    .lives-display {
        font-size: 1.4em;
        letter-spacing: 4px;
        line-height: 1;
    }

    .life-on  { color: #aa00ff; text-shadow: 0 0 8px rgba(160,0,255,0.9); }
    .life-off { color: #1a001a; text-shadow: none; }

    #center-info {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
    }

    #round-display {
        font-size: 0.5em;
        letter-spacing: 5px;
        color: #440055;
        text-transform: uppercase;
        text-align: center;
    }

    #tension-bar-wrap {
        width: 180px;
        height: 4px;
        background: #1a001a;
        border: 1px solid #330033;
    }
    #tension-bar {
        height: 100%;
        background: linear-gradient(to right, #440088, #ff00ff);
        width: 0%;
        transition: width 0.4s ease;
        box-shadow: 0 0 6px rgba(255,0,255,0.6);
    }

    /* ── MESSAGE BOX ── */
    #message-box {
        position: fixed;
        top: 50%; left: 50%;
        transform: translateX(-50%) translateY(-50%);
        background: rgba(3,0,6,0.95);
        border: 1px solid #660088;
        padding: 24px 52px;
        font-size: 2em;
        letter-spacing: 5px;
        text-transform: uppercase;
        text-align: center;
        color: #e0d0ff;
        max-width: 80vw;
        pointer-events: none;
        box-shadow: 0 0 30px rgba(140,0,200,0.5), inset 0 0 24px rgba(0,0,0,0.75);
        animation: msg-fadein 0.2s ease-out forwards;
        z-index: 50;
    }
    @keyframes msg-fadein {
        from { opacity: 0; transform: translateX(-50%) translateY(-48%); }
        to   { opacity: 1; transform: translateX(-50%) translateY(-50%); }
    }

    /* ── HAND DISPLAY ── */
    #hand-area {
        position: fixed;
        bottom: 130px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        pointer-events: none;
        z-index: 25;
    }

    #hand-label {
        font-size: 0.5em;
        letter-spacing: 6px;
        color: #440055;
        text-transform: uppercase;
    }

    #cards-row {
        display: flex;
        gap: 8px;
    }

    .card {
        width: 54px;
        height: 76px;
        background: rgba(8,0,12,0.95);
        border: 1px solid #550077;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1em;
        letter-spacing: 1px;
        color: #cc88ff;
        box-shadow: 0 0 8px rgba(100,0,180,0.3);
        position: relative;
        transition: transform 0.15s;
    }

    .card.red-suit { color: #ff4466; }
    .card.face-down {
        color: #220033;
        background: repeating-linear-gradient(
            45deg,
            #0a000f,
            #0a000f 4px,
            #110019 4px,
            #110019 8px
        );
    }

    #hand-value {
        font-size: 0.65em;
        letter-spacing: 4px;
        color: #880099;
        text-transform: uppercase;
    }

    /* ── ACTION BUTTONS ── */
    #action-area {
        padding: 0 24px 20px;
        pointer-events: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
    }

    #action-label {
        font-size: 0.48em;
        letter-spacing: 6px;
        color: #440055;
        text-transform: uppercase;
        margin-bottom: 2px;
    }

    .action-row {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        justify-content: center;
    }

    button {
        background: rgba(5,0,10,0.92);
        border: 1px solid #660088;
        color: #bbaacc;
        padding: 14px 32px;
        font-size: 0.9em;
        letter-spacing: 3px;
        text-transform: uppercase;
        cursor: pointer;
        font-family: inherit;
        box-shadow: 0 0 8px rgba(100,0,180,0.35);
        transition: background 0.15s, color 0.15s, box-shadow 0.15s;
        touch-action: manipulation;
    }

    button:hover {
        background: rgba(80,0,120,0.88);
        color: #fff;
        box-shadow: 0 0 16px rgba(180,0,255,0.6);
    }

    button:disabled {
        opacity: 0.35;
        cursor: default;
        box-shadow: none;
    }

    button.danger {
        border-color: #880000;
        box-shadow: 0 0 8px rgba(180,0,0,0.35);
    }
    button.danger:hover {
        background: rgba(120,0,0,0.88);
        box-shadow: 0 0 16px rgba(255,0,0,0.5);
    }

    button.safe {
        border-color: #006644;
        box-shadow: 0 0 8px rgba(0,180,80,0.25);
    }
    button.safe:hover {
        background: rgba(0,80,40,0.88);
        box-shadow: 0 0 16px rgba(0,255,100,0.4);
    }

    /* ── OPPONENT HAND ── */
    #opponent-area {
        position: fixed;
        top: 130px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        pointer-events: none;
        z-index: 25;
    }

    #opp-label {
        font-size: 0.48em;
        letter-spacing: 6px;
        color: #440055;
        text-transform: uppercase;
    }

    #opp-cards-row { display: flex; gap: 8px; }

    #opp-status {
        font-size: 0.55em;
        letter-spacing: 4px;
        color: #550066;
        text-transform: uppercase;
        min-height: 1.2em;
    }

    /* ── BLUFF METER ── */
    #bluff-meter {
        position: fixed;
        right: 24px;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        pointer-events: none;
        z-index: 25;
    }

    #bluff-label {
        font-size: 0.42em;
        letter-spacing: 4px;
        color: #440055;
        text-transform: uppercase;
        writing-mode: vertical-rl;
        text-orientation: mixed;
        transform: rotate(180deg);
    }

    #bluff-track {
        width: 6px;
        height: 140px;
        background: #0a000f;
        border: 1px solid #330044;
        position: relative;
        overflow: hidden;
    }

    #bluff-fill {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        background: linear-gradient(to top, #ff00ff, #aa00ff);
        height: 0%;
        transition: height 0.4s ease;
        box-shadow: 0 0 6px rgba(255,0,255,0.7);
    }

    /* ── LOBBY ── */
    #lobby-screen {
        position: fixed; inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.93);
        z-index: 100;
        gap: 0;
    }

    #lobby-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
    }

    #lobby-title {
        font-size: 3.2em;
        letter-spacing: 12px;
        color: #aa00ff;
        text-shadow: 0 0 30px rgba(180,0,255,0.8), 0 0 70px rgba(100,0,200,0.4);
        text-transform: uppercase;
        margin-bottom: 4px;
    }

    #lobby-subtitle {
        font-size: 0.7em;
        letter-spacing: 8px;
        color: #440055;
        text-transform: uppercase;
        margin-bottom: 10px;
    }

    #lobby-buttons {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 260px;
    }

    #online-setup {
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
        width: 260px;
    }

    #join-row {
        display: flex;
        gap: 8px;
        width: 100%;
    }

    input {
        background: rgba(5,0,10,0.92);
        border: 1px solid #550077;
        color: #cc88ff;
        padding: 12px 16px;
        font-size: 0.9em;
        letter-spacing: 4px;
        font-family: inherit;
        text-transform: uppercase;
        outline: none;
        box-shadow: 0 0 8px rgba(100,0,180,0.3);
        flex: 1;
    }
    input::placeholder { color: #220033; }

    #room-code-display {
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    #room-code-label { font-size: 0.5em; letter-spacing: 6px; color: #440055; }
    #room-code-text  { font-size: 2em; letter-spacing: 8px; color: #aa00ff; text-shadow: 0 0 12px rgba(180,0,255,0.6); }
    #lobby-status    { font-size: 0.5em; letter-spacing: 4px; color: #440055; }

    /* ── GAME OVER ── */
    #game-over-screen {
        position: fixed; inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.92);
        z-index: 110;
        gap: 24px;
    }

    #game-over-title {
        font-size: 4em;
        letter-spacing: 10px;
        color: #aa00ff;
        text-shadow: 0 0 40px rgba(180,0,255,0.9), 0 0 80px rgba(100,0,200,0.5);
        text-transform: uppercase;
    }

    #game-over-sub {
        font-size: 0.65em;
        letter-spacing: 6px;
        color: #550077;
        text-transform: uppercase;
    }

    /* ── HIDDEN ── */
    .hidden { display: none !important; }

    /* ── ELECTRIC STATIC ── */
    #static-overlay {
        position: fixed; inset: 0;
        pointer-events: none;
        z-index: 190;
        opacity: 0;
    }

    @keyframes static-pulse {
        0%, 100% { opacity: 0; }
        50% { opacity: 0.08; }
    }

    /* ── LOCAL P2 AREA ── */
    #p2-action-area {
        padding: 0 24px 20px;
        pointer-events: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
    }

    #p2-hand-area {
        position: fixed;
        bottom: 130px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        pointer-events: none;
        z-index: 25;
    }

    /* ── TURN BANNER ── */
    #turn-banner {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 1.2em;
        letter-spacing: 8px;
        color: #aa00ff;
        text-shadow: 0 0 20px rgba(180,0,255,0.8);
        text-transform: uppercase;
        z-index: 60;
        pointer-events: none;
        background: rgba(3,0,6,0.88);
        border: 1px solid #440066;
        padding: 16px 40px;
    }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div id="vignette"></div>
<div id="shock-overlay"></div>
<div id="static-overlay"></div>

<!-- Main UI -->
<div id="ui">
    <div class="info-bar">
        <div class="player-panel" id="p1-panel">
            <div class="player-name-label" id="p1-name-label">Player 1</div>
            <div class="lives-display" id="p1-lives">♥♥♥</div>
        </div>

        <div id="center-info">
            <div id="round-display">ROUND 1</div>
            <div id="tension-bar-wrap"><div id="tension-bar"></div></div>
        </div>

        <div class="player-panel" id="p2-panel">
            <div class="player-name-label" id="p2-name-label">Player 2</div>
            <div class="lives-display" id="p2-lives">♥♥♥</div>
        </div>
    </div>

    <!-- Opponent's hidden hand (top) -->
    <div id="opponent-area" class="hidden">
        <div id="opp-label">Opponent Hand</div>
        <div id="opp-cards-row"></div>
        <div id="opp-status"></div>
    </div>

    <!-- Player's hand (bottom) -->
    <div id="hand-area" class="hidden">
        <div id="hand-label">Your Hand</div>
        <div id="cards-row"></div>
        <div id="hand-value"></div>
    </div>

    <!-- Action buttons -->
    <div id="action-area" class="hidden">
        <div id="action-label">Your Turn</div>
        <div class="action-row" id="draw-row">
            <button id="btn-hit">Hit</button>
            <button id="btn-stand">Stand</button>
        </div>
        <div class="action-row" id="bluff-row">
            <button id="btn-bluff" class="danger">⚡ Bluff</button>
            <button id="btn-fold" class="safe">Fold</button>
        </div>
    </div>
</div>

<!-- Bluff meter sidebar -->
<div id="bluff-meter">
    <div id="bluff-track"><div id="bluff-fill"></div></div>
    <div id="bluff-label">Voltage</div>
</div>

<!-- Message box -->
<div id="message-box" class="hidden"></div>

<!-- Turn banner (local 2P) -->
<div id="turn-banner" class="hidden"></div>

<!-- Game Over -->
<div id="game-over-screen" class="hidden">
    <div id="game-over-title">FLATLINE</div>
    <div id="game-over-sub" id="game-over-sub"></div>
    <button id="btn-restart">Play Again</button>
</div>

<!-- Lobby -->
<div id="lobby-screen">
    <div id="lobby-content">
        <div id="lobby-title">VOLTAGE 21</div>
        <div id="lobby-subtitle">Survive the deal</div>
        <div id="lobby-buttons">
            <button id="mode-local">Local 2P</button>
            <button id="mode-online">Online 2P</button>
        </div>
        <div id="online-setup" class="hidden">
            <div id="online-options">
                <button id="create-room-btn">Create Room</button>
                <div id="join-row">
                    <input id="join-code-input" placeholder="Room Code" maxlength="6" autocomplete="off" spellcheck="false">
                    <button id="join-room-btn">Join</button>
                </div>
            </div>
            <div id="room-code-display" class="hidden">
                <div id="room-code-label">Room Code</div>
                <div id="room-code-text">------</div>
                <div id="lobby-status">Waiting for opponent...</div>
            </div>
            <button id="online-back-btn">← Back</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="game.js"></script>
</body>
</html>
