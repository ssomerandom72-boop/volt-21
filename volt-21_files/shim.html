            table = new THREE.Mesh(tableGeo, tableMat);
            table.receiveShadow = true;
            scene.add(table);

            // Dealer Silhouette
            const dealerGeo = new THREE.PlaneGeometry(3, 5);
            const dealerMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.95 });
            dealer = new THREE.Mesh(dealerGeo, dealerMat);
            dealer.position.set(0, 2.4, -4.5);
            scene.add(dealer);

            // Diegetic Buttons
            createButton("HIT", -2, 0.15, 1.2, 0x00ffaa, () => handleAction('hit'));
            createButton("STAND", 0, 0.15, 1.2, 0xaa00ff, () => handleAction('stand'));
            createButton("FOLD", 2, 0.15, 1.2, 0xff0044, () => handleAction('fold'));

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousedown', onMouseDown);
            
            initAudio();
            animate();
        }

        function createButton(text, x, y, z, color, callback) {
            const group = new THREE.Group();
            
            const baseGeo = new THREE.CylinderGeometry(0.35, 0.4, 0.1, 16);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const base = new THREE.Mesh(baseGeo, baseMat);
            group.add(base);

            const btnGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.08, 16);
            const btnMat = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.5 });
            const btn = new THREE.Mesh(btnGeo, btnMat);
            btn.position.y = 0.05;
            btn.userData.isButton = true;
            btn.userData.callback = callback;
            group.add(btn);

            group.position.set(x, y, z);
            scene.add(group);
            buttons3D.push(btn);
        }

        // --- AUDIO ENGINE ---
        let audioCtx, humOsc;
        function initAudio() {
            window.addEventListener('click', () => {
                if (audioCtx) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                // Background Hum
                humOsc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                humOsc.type = 'sawtooth';
                humOsc.frequency.setValueAtTime(50, audioCtx.currentTime);
                gain.gain.value = 0.01;
                humOsc.connect(gain);
                gain.connect(audioCtx.destination);
                humOsc.start();
            }, { once: true });
        }

        function playThud() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function playShockSound() {
            if (!audioCtx) return;
            // White noise burst
            const bufferSize = audioCtx.sampleRate * 0.5;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const g = audioCtx.createGain();
            g.gain.setValueAtTime(0.3, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            noise.connect(g); g.connect(audioCtx.destination);
            noise.start();
        }

        // --- GAME LOGIC ---
        function dealCard(who, faceUp = true) {
            const card = { rank: Math.floor(Math.random() * 10) + 1, suit: '♠' };
            state[who].hand.push(card);
            
            const geo = new THREE.BoxGeometry(0.7, 0.02, 1);
            const mat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const mesh = new THREE.Mesh(geo, mat);
            
            mesh.position.copy(DECK_POS);
            scene.add(mesh);
            cardMeshes.push(mesh);

            const targetZ = who === 'p1' ? PLAYER_Z : OPP_Z;
            const targetX = (state[who].hand.length - 1) * 0.8 - 1;
            
            animateTo(mesh, new THREE.Vector3(targetX, 0.12, targetZ), 0.5);
            playThud();
            updateHUD();
        }

        async function handleAction(type) {
            if (state.phase !== 'p1_turn') return;
            
            if (type === 'hit') {
                dealCard('p1');
                if (getHandTotal(state.p1.hand) > 21) {
                    state.phase = 'resolve';
                    triggerShock('p1');
                }
            } else if (type === 'stand') {
                state.phase = 'p2_turn';
                dealerTurn();
            }
        }

        function triggerShock(who) {
            state.glitchIntensity = 1.0;
            document.getElementById('shock-overlay').classList.add('shocking');
            setTimeout(() => document.getElementById('shock-overlay').classList.remove('shocking'), 500);
            playShockSound();
            state[who].lives--;
            updateHUD();
            
            if (state[who].lives <= 0) {
                endGame(who === 'p1' ? 'DEALER' : 'YOU');
            } else {
                setTimeout(nextRound, 2000);
            }
        }

        function getHandTotal(hand) {
            return hand.reduce((a, b) => a + b.rank, 0);
        }

        function updateHUD() {
            renderLives('p1');
            renderLives('p2');
            document.getElementById('tension-fill').style.height = state.tension + '%';
        }

        function renderLives(who) {
            const container = document.getElementById(`${who}-lives`);
            container.innerHTML = '';
            for (let i = 0; i < MAX_LIVES; i++) {
                const s = document.createElement('span');
                s.textContent = '■';
                s.className = i < state[who].lives ? 'life-on' : 'life-off';
                container.appendChild(s);
            }
        }

        // --- ANIMATION ---
        function animateTo(obj, target, duration) {
            const start = obj.position.clone();
            const startT = clock.elapsedTime;
            tweens.push({
                update: (t) => {
                    const progress = Math.min((t - startT) / duration, 1);
                    obj.position.lerpVectors(start, target, progress);
                    // Add a little spring rotation
                    obj.rotation.z = Math.sin(progress * Math.PI) * 0.1;
                    return progress >= 1;
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            const time = clock.elapsedTime;

            // Camera Lurk
            camera.position.x = camBase.x + Math.sin(time * 0.5) * 0.1;
            camera.position.y = camBase.y + Math.cos(time * 0.4) * 0.05;
            camera.lookAt(0, 0, 0);

            // Update Tweens
            for (let i = tweens.length - 1; i >= 0; i--) {
                if (tweens[i].update(time)) tweens.splice(i, 1);
            }

            // Glitch Decay
            if (state.glitchIntensity > 0) state.glitchIntensity -= dt * 2;

            renderer.render(scene, camera);
        }

        function onMouseDown(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            const intersects = raycaster.intersectObjects(buttons3D);
            if (intersects.length > 0) {
                const btn = intersects[0].object;
                btn.position.y -= 0.05; // Visual press
                setTimeout(() => btn.position.y += 0.05, 100);
                btn.userData.callback();
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- FLOW ---
        function nextRound() {
            cardMeshes.forEach(c => scene.remove(c));
            cardMeshes.length = 0;
            state.p1.hand = [];
            state.p2.hand = [];
            state.phase = 'p1_turn';
            dealCard('p1');
            dealCard('p1');
            dealCard('p2');
            updateHUD();
        }

        async function dealerTurn() {
            while (getHandTotal(state.p2.hand) < 17) {
                await new Promise(r => setTimeout(r, 800));
                dealCard('p2');
            }
            
            const p1 = getHandTotal(state.p1.hand);
            const p2 = getHandTotal(state.p2.hand);
            
            if (p2 > 21 || p1 > p2) triggerShock('p2');
            else if (p2 > p1) triggerShock('p1');
            else setTimeout(nextRound, 1000);
        }

        function endGame(winner) {
            document.getElementById('game-over-screen').classList.remove('hidden');
            document.getElementById('game-over-sub').textContent = `${winner} SURVIVED.`;
        }

        document.getElementById('mode-local').onclick = () => {
            document.getElementById('lobby-screen').classList.add('hidden');
            nextRound();
        };

        window.onload = init;
    </script>
